<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ridwanAhmedHridoy - Anonymous Q&A</title>
    <style>
        body {
            margin: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(180deg, #ff006e 0%, #ff8e3c 100%);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            position: relative;
        }

        /* Fixed Background Blob */
        .background-blob {
            position: absolute;
            top: -50px;
            right: -50px;
            width: 350px;
            height: 350px;
            background: rgba(255, 255, 255, 0.4);
            filter: blur(80px);
            border-radius: 50%;
            z-index: 0;
        }

        .container {
            width: 90%;
            max-width: 400px;
            text-align: center;
            position: relative;
            z-index: 1;
        }

        .card {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(10px);
            padding: 25px;
            border-radius: 25px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
            transition: transform 0.3s ease;
        }

        .card:hover {
            transform: translateY(-5px);
        }

        .user-info {
            display: flex;
            align-items: center;
            margin-bottom: 15px;
        }

        .avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            margin-right: 12px;
            object-fit: cover;
            border: 2px solid white;
        }

        /* Typewriter CSS */
        .username {
            font-weight: bold;
            font-size: 14px;
            color: #333;
        }

        #typewriter-text::after {
            content: "|";
            margin-left: 2px;
            color: #ff006e;
            font-weight: bold;
            animation: blink 0.8s infinite;
        }

        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0; }
        }

        .subtext {
            color: #666;
            font-size: 13px;
            display: block;
        }

        textarea {
            width: 100%;
            border: none;
            background: #fff0f3;
            border-radius: 15px;
            padding: 20px;
            box-sizing: border-box;
            font-size: 16px;
            resize: none;
            margin-top: 10px;
            outline: none;
            border: 1px solid transparent;
            transition: border 0.3s;
        }

        textarea:focus {
            border: 1px solid #ff006e;
        }

        button {
            background: black;
            color: white;
            border: none;
            padding: 15px 40px;
            border-radius: 50px;
            font-weight: bold;
            font-size: 18px;
            margin-top: 25px;
            width: 100%;
            cursor: pointer;
            transition: all 0.2s;
        }

        button:hover {
            background: #333;
            transform: scale(1.02);
        }

        button:active {
            transform: scale(0.98);
        }
    </style>
</head>
<body>

    <div class="background-blob"></div>

    <div class="container">
        <div class="card">
            <div class="user-info">
                <img src="ee86e5da0edbffbfb52f108723f71d9b.jpg" class="avatar" alt="Avatar">
                <div style="text-align: left;">
                    <span class="username" id="typewriter-text"></span>
                    <span class="subtext">Ask me anything, anonymously</span>
                </div>
            </div>

            <form action="https://formspree.io/f/mbdprwad" method="POST">
                <textarea name="message" placeholder="Send me a message..." rows="5" required></textarea>
                <button type="submit">Send!</button>
            </form>
        </div>
    </div>

    <script>
        const textElement = document.getElementById("typewriter-text");
        const nameToType = "@RidwanAhmedHridoy";
        let i = 0;

        function typeEffect() {
            if (i < nameToType.length) {
                textElement.innerHTML += nameToType.charAt(i);
                i++;
                setTimeout(typeEffect, 100);
            }
        }

        // Run the effect once the page loads
        window.onload = typeEffect;
    </script>

</body>
</html>
